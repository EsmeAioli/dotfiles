[container]
name=bluefin-dev
image=ghcr.io/ublue-os/bluefin:latest
home=$HOME
init=true
host-root=true
preserve-env=true
pull=true
description=Esme’s Bluefin Dev Container — for cloud-native dotfiles testing and desktop vibes

[setup]
# Executed inside the container on first run
run=sh /setup/bootstrap.sh

[bind]
# Optional: share your dotfiles in the container directly
path=$HOME/dotfiles:/dotfiles

[exec]
# Optional: default command on launch
default=/usr/bin/bash
