[nvim]
image=registry.fedoraproject.org/fedora-toolbox:43
additional_packages="neovim git fd-find curl ripgrep tree-sitter-cli"
init_hooks="dnf copr enable -y dejan/lazygit && dnf install -y lazygit && if [ -d ~/.config/nvim/.git ]; then echo 'nvim config detected, not pulling from EsmeAioli/nvim-config'; else git clone https://github.com/EsmeAioli/nvim-config.git ~/.config/nvim; fi"

