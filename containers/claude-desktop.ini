[claude-desktop]
image=registry.fedoraproject.org/fedora-toolbox:43
additional_packages="curl nss nspr atk at-spi2-atk cups-libs libdrm libxkbcommon libXcomposite libXdamage libXfixes libXrandr mesa-libgbm alsa-lib cairo cairo-gobject pango gtk3 libX11 libXcursor libXext libXi libXtst dbus-libs"
init_hooks="curl -fsSL https://pkg.claude-desktop-debian.dev/rpm/claude-desktop.repo -o /etc/yum.repos.d/claude-desktop.repo && dnf install -y claude-desktop && distrobox-export --app /usr/bin/claude-desktop"
